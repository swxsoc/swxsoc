name: Downstream Integration Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package_filter:
        description: Comma-separated package names from .github/downstream-packages.json
        required: false
        type: string

# Security hardening: tests only need read access to the repository contents
permissions:
  contents: read

# prevent duplicate downstream runs for the same PR or branch
concurrency:
  group: downstream-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  define-matrix:
    name: Build downstream matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - name: Check out swxsoc
        uses: actions/checkout@v4

      - name: Build enabled package matrix
        id: build
        env:
          PACKAGE_FILTER: ${{ github.event.inputs.package_filter || '' }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          from pathlib import Path

          manifest = Path('.github/downstream-packages.json')
          packages = json.loads(manifest.read_text())["packages"]
          requested = {
              name.strip()
              for name in os.getenv("PACKAGE_FILTER", "").split(",")
              if name.strip()
          }

          enabled = [pkg for pkg in packages if pkg.get("enabled", True)]
          if requested:
              selected = [pkg for pkg in enabled if pkg["name"] in requested]
              selected_names = {pkg["name"] for pkg in selected}
              missing = sorted(requested - selected_names)
              if missing:
                  raise SystemExit(
                      "Unknown or disabled package names: " + ", ".join(missing)
                  )
          else:
              selected = enabled

          if not selected:
              raise SystemExit("No downstream packages selected")

          matrix = {"include": selected}
          print(f"matrix={json.dumps(matrix, separators=(',', ':'))}")
          PY

  downstream-tests:
    name: ${{ matrix.name }}
    needs: define-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-matrix.outputs.matrix) }}

    steps:
      - name: Check out swxsoc
        uses: actions/checkout@v4
        with:
          path: swxsoc

      - name: Set up Python ${{ matrix.python_version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}
          cache: pip

      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Check out downstream repository
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.ref }}
          path: downstream

      - name: Install downstream package and its test dependencies
        working-directory: downstream
        run: ${{ matrix.install_command }}

      - name: Reinstall swxsoc from the pull request branch
        working-directory: swxsoc
        run: |
          python -m pip install --force-reinstall -e .
          python - <<'PY'
          import swxsoc

          print(f"Using swxsoc from {swxsoc.__file__}")
          print(f"swxsoc version: {swxsoc.__version__}")
          PY

      - name: Run downstream test suite
        working-directory: downstream
        env:
          SWXSOC_SHA_UNDER_TEST: ${{ github.sha }}
        run: ${{ matrix.test_command }}